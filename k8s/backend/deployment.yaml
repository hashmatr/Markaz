apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: markaz
  labels:
    app: backend
    app.kubernetes.io/name: markaz-backend
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime deployments
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Gracefully drain connections before terminating a pod
      terminationGracePeriodSeconds: 30

      containers:
        - name: backend
          # ⚠️  Replace with your actual Docker registry image after pushing:
          #     docker build -t ghcr.io/hashmatr/markaz-backend:latest ./Backend
          #     docker push ghcr.io/hashmatr/markaz-backend:latest
          image: ghcr.io/hashmatr/markaz-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http

          # Load non-sensitive config from ConfigMap
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret

          # Resource limits (tune based on your cluster size)
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "750m"

          # Liveness probe — restart container if API is unresponsive
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5

          # Readiness probe — don't route traffic until API is ready
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3

      # Spread pods across nodes for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: backend
                topologyKey: kubernetes.io/hostname
