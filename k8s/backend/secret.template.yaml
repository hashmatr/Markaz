# ─────────────────────────────────────────────────────────────────────────────
# Backend Secret — TEMPLATE ONLY (safe to commit — no real values)
# ⚠️  NEVER paste real credentials here. This file is committed to Git.
#
# To create the real secret in your cluster, run:
#   .\k8s\scripts\create-secret.ps1
#
# Or manually:
#   kubectl create secret generic backend-secret --namespace=markaz \
#     --from-env-file=./Backend/.env
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: markaz
  labels:
    app: backend
type: Opaque
stringData:
  # ── MongoDB ───────────────────────────────────
  mongodb_url: "REPLACE_WITH_YOUR_MONGODB_URL"

  # ── JWT ──────────────────────────────────────
  Secret_jwt_token: "REPLACE_WITH_JWT_SECRET"
  JWT_REFRESH_SECRET: "REPLACE_WITH_JWT_REFRESH_SECRET"

  # ── Cloudinary ───────────────────────────────
  CLOUDINARY_CLOUD_NAME: "REPLACE_WITH_CLOUD_NAME"
  CLOUDINARY_API_KEY: "REPLACE_WITH_API_KEY"
  CLOUDINARY_API_SECRET: "REPLACE_WITH_API_SECRET"

  # ── Email ────────────────────────────────────
  EMAIL_USER: "REPLACE_WITH_EMAIL"
  EMAIL_PASSWORD: "REPLACE_WITH_APP_PASSWORD"

  # ── Groq AI ──────────────────────────────────
  Groq_Api: "REPLACE_WITH_GROQ_KEY"
  GROQ_API_KEY: "REPLACE_WITH_GROQ_KEY"

  # ── Pinecone ─────────────────────────────────
  PINECONE_API_KEY: "REPLACE_WITH_PINECONE_KEY"

  # ── Stripe ───────────────────────────────────
  STRIPE_SECRET_KEY: "REPLACE_WITH_STRIPE_SECRET_KEY"
  STRIPE_PUBLISHABLE_KEY: "REPLACE_WITH_STRIPE_PUBLISHABLE_KEY"

  # ── Redis ────────────────────────────────────
  REDIS_URL: "REPLACE_WITH_REDIS_URL"
  REDIS_HOST: "127.0.0.1"
  REDIS_PORT: "6379"
