# ─────────────────────────────────────────────────────────────────────────────
# CI — Continuous Integration
# Runs on every push and pull request to verify the codebase is healthy.
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: ["**"]          # All branches
  pull_request:
    branches: [main]

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Backend — lint + build check
  # ───────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors (node --check)
        run: node --check src/index.js

      - name: Validate package.json scripts
        run: node -e "const p = require('./package.json'); console.log('Scripts:', Object.keys(p.scripts).join(', '))"

  # ───────────────────────────────────────────────────────────────────────────
  # Frontend — lint + Vite build
  # ───────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Vite + React)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (Vite production bundle)
        run: npm run build
        env:
          VITE_BACKEND_URL: /api   # Placeholder — Nginx proxies at runtime

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist
          retention-days: 3

  # ───────────────────────────────────────────────────────────────────────────
  # Docker — validate both Dockerfiles can build
  # ───────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]    # Only run if code checks pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          push: false
          tags: markaz-backend:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          push: false
          tags: markaz-frontend:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
