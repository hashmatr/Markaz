# ─────────────────────────────────────────────────────────────────────────────
# CD — Continuous Delivery
# Triggers on push to main (after CI passes).
# Builds Docker images, pushes to GitHub Container Registry (GHCR),
# then deploys to Kubernetes.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   MONGODB_URL            — MongoDB Atlas connection string
#   SECRET_JWT_TOKEN       — JWT access token secret
#   JWT_REFRESH_SECRET     — JWT refresh token secret
#   CLOUDINARY_CLOUD_NAME  — Cloudinary cloud name
#   CLOUDINARY_API_KEY     — Cloudinary API key
#   CLOUDINARY_API_SECRET  — Cloudinary API secret
#   EMAIL_USER             — Gmail address
#   EMAIL_PASSWORD         — Gmail app password
#   GROQ_API_KEY           — Groq API key
#   PINECONE_API_KEY       — Pinecone API key
#   STRIPE_SECRET_KEY      — Stripe secret key
#   STRIPE_PUBLISHABLE_KEY — Stripe publishable key
#   REDIS_URL              — Upstash Redis TLS URL
#   KUBE_CONFIG            — base64-encoded kubeconfig (optional, for K8s deploy)
# ─────────────────────────────────────────────────────────────────────────────
name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:             # Allow manual trigger from GitHub UI

# Cancel any in-progress CD run when a new commit is pushed
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/markaz-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/markaz-frontend

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: Build & Push Backend Image
  # ───────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write            # Required to push to GHCR

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # Auto-provided by GitHub

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: Build & Push Frontend Image
  # ───────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_BACKEND_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy to Kubernetes
  # Runs after both images are pushed successfully.
  # Requires KUBE_CONFIG secret to be set.
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    # Only deploy if KUBE_CONFIG secret is configured.
    # NOTE: secrets context is not available in job-level if: expressions,
    # so we guard the kubeconfig step individually using an env variable instead.

    environment:
      name: production
      url: http://markaz.yourdomain.com   # Update with your real domain

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure kubeconfig
        # Skip this step (and implicitly all dependant steps) if the secret is absent
        if: ${{ env.KUBE_CONFIG_VALUE != '' }}
        env:
          KUBE_CONFIG_VALUE: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG_VALUE" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create / update backend Secret from GitHub Secrets
        run: |
          kubectl create secret generic backend-secret \
            --namespace=markaz \
            --from-literal=mongodb_url="${{ secrets.MONGODB_URL }}" \
            --from-literal=Secret_jwt_token="${{ secrets.SECRET_JWT_TOKEN }}" \
            --from-literal=JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}" \
            --from-literal=CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}" \
            --from-literal=CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}" \
            --from-literal=CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}" \
            --from-literal=EMAIL_USER="${{ secrets.EMAIL_USER }}" \
            --from-literal=EMAIL_PASSWORD="${{ secrets.EMAIL_PASSWORD }}" \
            --from-literal=Groq_Api="${{ secrets.GROQ_API_KEY }}" \
            --from-literal=GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            --from-literal=PINECONE_API_KEY="${{ secrets.PINECONE_API_KEY }}" \
            --from-literal=STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            --from-literal=STRIPE_PUBLISHABLE_KEY="${{ secrets.STRIPE_PUBLISHABLE_KEY }}" \
            --from-literal=REDIS_URL="${{ secrets.REDIS_URL }}" \
            --from-literal=REDIS_HOST="127.0.0.1" \
            --from-literal=REDIS_PORT="6379" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply ConfigMap
        run: kubectl apply -f k8s/backend/configmap.yaml

      - name: Update backend image tag in deployment
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }} \
            -n markaz || kubectl apply -f k8s/backend/deployment.yaml

      - name: Update frontend image tag in deployment
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }} \
            -n markaz || kubectl apply -f k8s/frontend/deployment.yaml

      - name: Apply Services
        run: |
          kubectl apply -f k8s/backend/service.yaml
          kubectl apply -f k8s/frontend/service.yaml

      - name: Apply HPA
        run: kubectl apply -f k8s/hpa.yaml

      - name: Wait for backend rollout
        run: kubectl rollout status deployment/backend -n markaz --timeout=120s

      - name: Wait for frontend rollout
        run: kubectl rollout status deployment/frontend -n markaz --timeout=60s

      - name: Deployment summary
        run: |
          echo "## Deployment Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service  | Image Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | sha-$(echo ${{ github.sha }} | cut -c1-7) |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | sha-$(echo ${{ github.sha }} | cut -c1-7) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n markaz >> $GITHUB_STEP_SUMMARY
