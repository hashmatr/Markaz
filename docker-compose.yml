services:
  # ─────────────────────────────────────────────────────────────────
  # Backend — Node.js / Express API
  # ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: markaz-backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    # Override specific env vars that differ in Docker networking
    environment:
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: http://localhost # Frontend served on port 80 via Nginx
      ADMIN_URL: http://localhost:3001
    ports:
      - "5000:5000" # Expose directly (optional — useful for debugging)
    networks:
      - markaz-network
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:5000/" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────────────────────────
  # Frontend — Vite/React served by Nginx
  # ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: markaz-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - markaz-network

networks:
  markaz-network:
    driver: bridge
